<!doctype html>
<html lang="{{ lang|default:'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} | Kejebe</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1d2433;
      --muted: #5d6678;
      --border: #e5e8f0;
      --accent: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #f2f7ff, var(--bg) 45%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      padding: 24px 16px;
    }
    .wrap {
      max-width: 860px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    h1 { margin: 0 0 8px; font-size: 28px; line-height: 1.2; }
    .meta { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
    .meta strong { color: var(--text); }
    ol { margin: 0; padding-left: 20px; }
    li { margin: 10px 0; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .support {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
    }
    @media (max-width: 640px) {
      .wrap { padding: 18px; border-radius: 12px; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>{{ title }}</h1>
    <p class="meta"><strong>{{ last_updated_label }}:</strong> {{ last_updated }}</p>
    <ol>
      {% for item in terms_items %}
        <li>{{ item }}</li>
      {% endfor %}
      <li>
        {{ privacy_policy_label }}:
        <a href="{{ privacy_url }}">{{ privacy_policy_label }}</a>
      </li>
    </ol>
    <p class="support">
      {{ report_email_label }}: <a href="mailto:{{ support_email }}">{{ support_email }}</a>
    </p>
  </main>
</body>
</html>
