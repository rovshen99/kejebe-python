<!doctype html>
<html lang="{{ lang|default:'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} | Kejebe</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f6f7fb;
      color: #1d2433;
      padding: 24px 16px;
    }
    main {
      max-width: 760px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e8f0;
      border-radius: 14px;
      padding: 24px;
      line-height: 1.6;
    }
    h1 { margin-top: 0; }
    .meta { color: #5d6678; font-size: 14px; }
    a { color: #0f766e; }
  </style>
</head>
<body>
  <main>
    <h1>{{ title }}</h1>
    <p>{{ description }}</p>
    <p class="meta">Last updated: {{ last_updated }}</p>
    <p>Support: <a href="mailto:{{ support_email }}">{{ support_email }}</a></p>
  </main>
</body>
</html>
