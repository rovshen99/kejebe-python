<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | {{ app_name }}</title>
  <meta name="description" content="This service is no longer available in Kejebe.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e8;
      --surface: #fffdf8;
      --text: #1f1a14;
      --muted: #6f6255;
      --accent: #c46f28;
      --accent-dark: #9f561c;
      --border: #eadfce;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #fff8ed 0%, var(--bg) 48%, #efe7da 100%);
      color: var(--text);
    }
    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(54, 33, 12, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      line-height: 1.1;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
    }
    .button-primary {
      background: var(--accent);
      color: #fff;
    }
    .button-primary:hover { background: var(--accent-dark); }
    .button-secondary {
      border: 1px solid var(--border);
      color: var(--text);
      background: #fff;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Service not found</h1>
      <p>This service is unavailable or has already been removed.</p>
      <p>You can still open the app and continue browsing other services.</p>
      <div class="actions">
        <a class="button button-primary" href="{{ app_link }}">Open in app</a>
        {% if android_play_store_url %}
        <a class="button button-secondary" href="{{ android_play_store_url }}">Google Play</a>
        {% endif %}
        {% if ios_app_store_url %}
        <a class="button button-secondary" href="{{ ios_app_store_url }}">App Store</a>
        {% endif %}
      </div>
    </section>
  </main>
</body>
</html>
